<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>주식저장소 - 추천주를 주는 주식 앱</title>
  <meta name="description" content="전문 애널리스트가 엄선한 추천주를 받아보세요. 국내·미국 주식 종목 분석, 포트폴리오 관리, 실시간 알림까지." />
  <meta property="og:title" content="주식저장소 - 추천주를 주는 주식 앱" />
  <meta property="og:description" content="전문 애널리스트가 엄선한 추천주를 받아보세요." />
  <meta property="og:type" content="website" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans KR', sans-serif;
      background: #0A0E1A;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    h1 {
      font-size: 32px;
      font-weight: 800;
      color: #4ADE80;
      letter-spacing: -1px;
      margin-bottom: 8px;
      text-align: center;
    }

    .tagline {
      font-size: 16px;
      color: #aaa;
      text-align: center;
      margin-bottom: 48px;
      line-height: 1.6;
    }

    .features {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 48px;
      max-width: 480px;
    }

    .feature-chip {
      background: #1A2035;
      border: 1px solid #2a3550;
      border-radius: 20px;
      padding: 8px 16px;
      font-size: 13px;
      color: #ccc;
    }

    .feature-chip span {
      color: #4ADE80;
      margin-right: 4px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 320px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 16px 24px;
      border-radius: 14px;
      font-size: 16px;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      opacity: 0.92;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-android {
      background: #4ADE80;
      color: #0A0E1A;
    }

    .btn-ios {
      background: #fff;
      color: #0A0E1A;
    }

    .btn-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      line-height: 1.2;
    }

    .btn-sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.7;
    }

    .btn-main {
      font-size: 16px;
      font-weight: 700;
    }

    .divider {
      width: 100%;
      max-width: 320px;
      height: 1px;
      background: #1A2035;
      margin: 40px 0 24px;
    }

    .links {
      display: flex;
      gap: 24px;
    }

    .links a {
      color: #666;
      font-size: 13px;
      text-decoration: none;
    }

    .links a:hover {
      color: #4ADE80;
    }

    footer {
      margin-top: 24px;
      color: #444;
      font-size: 12px;
    }
  </style>
</head>
<body>

  <div class="logo">📊</div>
  <h1>주식저장소</h1>
  <p class="tagline">추천주를 주는 주식 앱<br>전문가가 엄선한 종목을 알림으로 받아보세요</p>

  <div class="features">
    <div class="feature-chip"><span>✦</span> 오늘의 추천주</div>
    <div class="feature-chip"><span>✦</span> 국내·미국 주식</div>
    <div class="feature-chip"><span>✦</span> 실시간 알림</div>
    <div class="feature-chip"><span>✦</span> 포트폴리오 관리</div>
    <div class="feature-chip"><span>✦</span> 시장 심리 지표</div>
  </div>

  <div class="buttons">
    <a class="btn btn-android" href="https://play.google.com/store/apps/details?id=www.stockstorage.stockdiary" target="_blank" rel="noopener">
      <!-- Google Play icon -->
      <svg class="btn-icon" viewBox="0 0 512 512" fill="currentColor">
        <path d="M99.2 38.4C77.8 26.5 52 41.6 52 66.2v379.6c0 24.6 25.8 39.7 47.2 27.8l361.6-189.8c22.1-11.6 22.1-43.9 0-55.5L99.2 38.4z"/>
      </svg>
      <div class="btn-text">
        <span class="btn-sub">Google Play에서 받기</span>
        <span class="btn-main">Android</span>
      </div>
    </a>

    <a class="btn btn-ios" href="https://apps.apple.com/us/app/%EC%A3%BC%EC%8B%9D%EC%A0%80%EC%9E%A5%EC%86%8C-%EC%B6%94%EC%B2%9C%EC%A3%BC%EB%A5%BC-%EC%A3%BC%EB%8A%94-%EC%A3%BC%EC%8B%9D-%EC%95%B1/id1577127218" target="_blank" rel="noopener">
      <!-- Apple icon -->
      <svg class="btn-icon" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      <div class="btn-text">
        <span class="btn-sub">App Store에서 받기</span>
        <span class="btn-main">iPhone · iPad</span>
      </div>
    </a>
  </div>

  <div class="divider"></div>

  <div class="links">
    <a href="support.html">고객 지원</a>
    <a href="privacy.html">개인정보처리방침</a>
  </div>

  <footer>© 2026 주식저장소 · 두부소프트</footer>

</body>
</html>
